// 1.0 = Render at window size. Higher numbers produce smoother image, but values above 2.0 are not recommended
Resolution scaling: 2.0

// Exact rendering width & height - will be used instead of scaling multiplier if width & height are non-zero.
// Might be more reliable with fullscreen modes.
Render width: 0
Render height: 0

// 1 = Unlimited FPS, 0 = Default 60 FPS cap
FPS Unlock: 1

// 1 = Unlocked camera angles, 0 = Default
Camera unlock: 1